apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-sales
  namespace: cinema-system
  labels:
    app: ticket-sales
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-sales
  template:
    metadata:
      labels:
        app: ticket-sales
    spec:
      containers:
        - name: ticket-sales
          image: ticket-sales:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: MOVIE_CATALOG_URL
              value: "http://movie-catalog:8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-sales
  namespace: cinema-system
  labels:
    app: ticket-sales
spec:
  type: NodePort
  selector:
    app: ticket-sales
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30001
      name: http
