apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-catalog
  namespace: cinema-system
  labels:
    app: movie-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-catalog
  template:
    metadata:
      labels:
        app: movie-catalog
    spec:
      containers:
        - name: movie-catalog
          image: movie-catalog:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DELAY_MS
              value: "0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: movie-catalog
  namespace: cinema-system
  labels:
    app: movie-catalog
spec:
  type: NodePort
  selector:
    app: movie-catalog
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
      name: http
